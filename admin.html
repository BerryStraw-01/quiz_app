<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>

    <style>
        body{
          font-family:sans-serif;
          margin:0;
          background:#f5f5f5;
          font-size:24px;
        }

        h1{
          text-align:center;
          font-size:36px;
          margin:20px;
        }

        .card{
          background:white;
          margin:15px;
          padding:25px;
          border-radius:18px;
          box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        button{
          width:100%;
          height:80px;
          font-size:24px;
          border:none;
          border-radius:14px;
          margin-bottom:12px;
        }

        .grid-2{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:15px;
        }

        .grid-3{
          display:grid;
          grid-template-columns:1fr 1fr 1fr;
          gap:15px;
        }

        /* 状態 */
        .active{ background:#5cc8ff; color:white; }
        .inactive{ background:#d6ecff; }
        .gray{ background:#ccc; color:#666; }

        .toggleActive{ background:#5cc8ff; color:white; }
        .toggleInactive{ background:#d6ecff; }

        .reset{ background:#444; color:white; }

        #playerCount{
          font-size:32px;
          font-weight:bold;
          text-align:center;
        }

        /* 問題一覧 */
        #questionList{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:15px;
        }

        .q-card{
          padding:18px;
          border-radius:14px;
          font-size:20px;
        }
    </style>
</head>

<body>

<h1>管理画面</h1>

<div class="card">
    <button class="reset" onclick="reset()">🔄 初期化</button>
</div>

<div class="card">
    <div id="playerCount">参加人数：0人</div>
</div>

<div class="card">
    <h3>進行操作</h3>

    <div class="grid-2">
        <button id="btnJoin" onclick="startJoin()">参加受付</button>
        <button id="btnWait" onclick="goWaiting()">待機</button>
    </div>

    <div class="grid-3">
        <button id="btnAnswer" onclick="showAnswer()">解答</button>
        <button id="btnRanking" onclick="showRanking()">ランキング</button>
        <button id="btnQuestion">問題</button>
    </div>
</div>

<div class="card">
    <h3>問題選択</h3>

    <button id="btnToggle" onclick="toggleAnswer()"></button>

    <div id="questionList"></div>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, doc, setDoc, onSnapshot,
      collection, getDocs, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSy...",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let state = {
      mode:"waiting",
      questionId:1,
      acceptingAnswers:false
    };

    const update = ()=> setDoc(doc(db,"game","state"), state);

    /* =====================
       ✅ 参加人数（完全版）
    ===================== */
    onSnapshot(collection(db,"players"), snap=>{
      document.getElementById("playerCount").innerText =
        "参加人数：" + snap.size + "人";
    });

    /* =====================
       ✅ 問題一覧（復活）
    ===================== */
    async function loadQuestions(){

      const snap = await getDocs(collection(db,"questions"));

      let html="";

      snap.forEach(docSnap=>{
        const d = docSnap.data();
        const id = docSnap.id.replace("q","");

        html += `
          <div id="q${id}" class="q-card inactive"
            onclick="setQ(${id})">
            第${id}問：${d.text}
          </div>
        `;
      });

      document.getElementById("questionList").innerHTML = html;
    }

    /* =====================
       ✅ UI更新（完全復元）
    ===================== */
    function updateUI(s){

      set("btnJoin", s.mode==="join");
      set("btnWait", s.mode==="waiting");
      set("btnAnswer", s.mode==="answer");
      set("btnRanking", s.mode==="ranking");

      // 問題ボタン
      const qBtn=document.getElementById("btnQuestion");
      qBtn.classList.remove("active","gray");
      qBtn.classList.add(s.mode==="question" ? "active" : "gray");

      // 問題一覧
      document.querySelectorAll(".q-card").forEach(el=>{
        el.classList.remove("active");
        el.classList.add("inactive");
      });

      const cur=document.getElementById("q"+s.questionId);
      if(cur){
        cur.classList.remove("inactive");
        cur.classList.add("active");
      }

      // 回答
      const btn=document.getElementById("btnToggle");

      if(s.acceptingAnswers){
        btn.className="toggleActive";
        btn.innerText="回答：ON";
      }else{
        btn.className="toggleInactive";
        btn.innerText="回答：OFF";
      }
    }

    function set(id,flag){
      const el=document.getElementById(id);
      el.classList.remove("active","inactive");
      el.classList.add(flag ? "active":"inactive");
    }

    /* =====================
       操作（全部復活）
    ===================== */

    window.startJoin=()=>{ state.mode="join"; update(); };
    window.goWaiting=()=>{ state.mode="waiting"; update(); };

    window.setQ=q=>{
      state.questionId=q;
      state.mode="question";
      state.acceptingAnswers=false;
      update();
    };

    window.showAnswer=()=>{ state.mode="answer"; update(); };

    window.showRanking=async()=>{

      const snap = await getDocs(collection(db,"players"));

      let arr=[];
      snap.forEach(d=>arr.push(d.data()));

      arr.sort((a,b)=>b.score-a.score);

      await setDoc(doc(db,"ranking","current"),{
        top10:arr.slice(0,10)
      });

      state.mode="ranking";
      update();
    };

    window.toggleAnswer=()=>{
      state.acceptingAnswers=!state.acceptingAnswers;
      update();
    };

    window.reset = async ()=>{
      state = {mode:"waiting",questionId:1,acceptingAnswers:false};
      await setDoc(doc(db,"game","state"), state);

      const p = await getDocs(collection(db,"players"));
      for(const d of p.docs) await deleteDoc(d.ref);
    };

    /* =====================
       監視
    ===================== */
    onSnapshot(doc(db,"game","state"), snap=>{
      updateUI(snap.data());
    });

    /* 初期 */
    loadQuestions();

</script>
</body>
</html>
