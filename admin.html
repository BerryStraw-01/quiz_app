<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>

    <style>

        body{
          font-family:sans-serif;
          margin:0;
          background:#f5f5f5;
        }

        /* タイトル */
        h1{
          text-align:center;
          margin:15px;
        }

        /* カード */
        .card{
          background:white;
          margin:10px;
          padding:15px;
          border-radius:15px;
          box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        /* ボタン（横いっぱい） */
        button{
          width:100%;
          padding:14px;
          margin-bottom:10px;
          border:none;
          border-radius:10px;
          font-size:14px;
        }

        /* 上段2つ */
        .grid-2{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:10px;
        }

        /* 下段3つ */
        .grid-3{
          display:grid;
          grid-template-columns:1fr 1fr 1fr;
          gap:10px;
        }

        /* 状態カラー */
        .active{
          background:#5cc8ff;
          color:white;
          font-weight:bold;
        }

        .inactive{
          background:#d6ecff;
        }

        /* 問題ボタン（灰色） */
        .gray{
          background:#ccc;
          color:#666;
        }

        /* 回答 */
        .toggleActive{
          background:#5cc8ff;
          color:white;
        }

        .toggleInactive{
          background:#d6ecff;
        }

        /* 初期化 */
        .reset{
          background:#444;
          color:white;
        }

        /* 問題一覧 */
        #questionList{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:10px;
        }

        .q-card{
          padding:12px;
          border-radius:10px;
          font-size:14px;
          text-align:left;
        }

    </style>
</head>

<body>

<h1>管理画面</h1>

<!-- 初期 -->
<div class="card">
    <button class="reset" onclick="reset()">🔄 初期化</button>
</div>

<!-- 進行 -->
<div class="card">

    <h3>進行操作</h3>

    <!-- 上段 -->
    <div class="grid-2">
        <button id="btnJoin" onclick="startJoin()">参加受付</button>
        <button id="btnWait" onclick="goWaiting()">待機</button>
    </div>

    <!-- 下段 -->
    <div class="grid-3">
        <button id="btnQuestion">問題</button>
        <button id="btnAnswer" onclick="showAnswer()">解答</button>
        <button id="btnRanking" onclick="showRanking()">ランキング</button>
    </div>

</div>

<!-- 問題選択 -->
<div class="card">

    <h3>問題選択</h3>

    <button id="btnToggle" onclick="toggleAnswer()"></button>

    <div id="questionList"></div>

</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,doc,setDoc,onSnapshot,
      collection,getDocs,deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSy...",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let state = {
      mode:"waiting",
      questionId:1,
      acceptingAnswers:false
    };

    const update = ()=> setDoc(doc(db,"game","state"),state);

    /* =====================
       問題一覧
    ===================== */
    async function loadQuestions(){

      const snap = await getDocs(collection(db,"questions"));

      let html="";

      snap.forEach(docSnap=>{

        const d = docSnap.data();
        const id = docSnap.id.replace("q","");

        html += `
          <div id="q${id}" class="q-card inactive"
               onclick="setQ(${id})">
            第${id}問：${d.text}
          </div>
        `;
      });

      document.getElementById("questionList").innerHTML = html;
    }

    /* =====================
       UI更新
    ===================== */
    function updateUI(s){

      set("btnJoin", s.mode==="join");
      set("btnWait", s.mode==="waiting");
      set("btnAnswer", s.mode==="answer");
      set("btnRanking", s.mode==="ranking");

      // ✅ 問題ボタン（灰色＋条件）
      const qBtn = document.getElementById("btnQuestion");

      if(s.mode==="question"){
        qBtn.className="active";
      }else{
        qBtn.className="gray";
      }

      // ✅ 問題選択
      document.querySelectorAll(".q-card").forEach(el=>{
        el.classList.remove("active");
        el.classList.add("inactive");
      });

      const current=document.getElementById("q"+s.questionId);
      if(current){
        current.classList.remove("inactive");
        current.classList.add("active");
      }

      // ✅ 回答
      const btn=document.getElementById("btnToggle");

      if(s.acceptingAnswers){
        btn.className="toggleActive";
        btn.innerText="回答：ON";
      }else{
        btn.className="toggleInactive";
        btn.innerText="回答：OFF";
      }
    }

    /* 共通 */
    function set(id,flag){
      const el=document.getElementById(id);
      el.className = flag ? "active" : "inactive";
    }

    /* =====================
       操作
    ===================== */

    window.reset = async ()=>{
      state = {mode:"waiting",questionId:1,acceptingAnswers:false};
      await setDoc(doc(db,"game","state"),state);

      const players = await getDocs(collection(db,"players"));
      for(const p of players.docs) await deleteDoc(p.ref);

      const answers = await getDocs(collection(db,"answers"));
      for(const q of answers.docs){
        const users = await getDocs(collection(db,"answers",q.id,"users"));
        for(const u of users.docs) await deleteDoc(u.ref);
      }

      await setDoc(doc(db,"ranking","current"),{top10:[]});
    };

    window.startJoin=()=>{ state.mode="join"; update(); };
    window.goWaiting=()=>{ state.mode="waiting"; update(); };
    window.setQ=(q)=>{ state.questionId=q; state.mode="question"; state.acceptingAnswers=false; update(); };
    window.showAnswer=()=>{ state.mode="answer"; update(); };
    window.showRanking = async ()=>{

      // ✅ プレイヤー取得
      const snap = await getDocs(collection(db,"players"));

      let arr = [];

      snap.forEach(d=>{
        const data = d.data();

        arr.push({
          name: data.name,
          score: data.score || 0
        });
      });

      // ✅ スコア順
      arr.sort((a,b)=> b.score - a.score);

      // ✅ 上位10人保存
      await setDoc(doc(db,"ranking","current"),{
        top10: arr.slice(0,10)
      });

      // ✅ 表示へ
      state.mode="ranking";
      update();
    };

    window.toggleAnswer=()=>{ state.acceptingAnswers=!state.acceptingAnswers; update(); };

    /* =====================
       state監視
    ===================== */
    onSnapshot(doc(db,"game","state"),snap=>{
      updateUI(snap.data());
    });

    /* 初期 */
    loadQuestions();

</script>
</body>
</html>
