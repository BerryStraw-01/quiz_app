<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
</head>

<body>

<h1>管理画面</h1>

<button onclick="reset()">初期画面</button>

<hr>

<button onclick="startJoin()">参加受付</button>
<button onclick="goWaiting()">待機</button>
<button onclick="showAnswer()">解答表示</button>

<!-- ✅ ランキング -->
<button onclick="computeRanking()">ランキング計算 & 表示</button>

<hr>

<button onclick="setQ(1)">第1問</button>
<button onclick="setQ(2)">第2問</button>

<hr>

<button onclick="toggleAnswer()">回答 ON/OFF</button>

<pre id="status"></pre>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,doc,setDoc,onSnapshot,
      collection,getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
    apiKey:"AIzaSy...",
    authDomain:"quiz-app-97d7c.firebaseapp.com",
    projectId:"quiz-app-97d7c"
    }));

    let state = {
      mode:"waiting",
      questionId:1,
      acceptingAnswers:false
    };

    const update = ()=> {
      setDoc(doc(db,"game","state"),state,{merge:false});
    };

    // ----------------
    // 状態
    // ----------------
    window.reset=()=>{
      state.mode="waiting";
      state.acceptingAnswers=false;
      update();
    };

    window.goWaiting=()=>{
      state.mode="waiting";
      state.acceptingAnswers=false;
      update();
    };

    window.startJoin=()=>{
      state.mode="join";
      update();
    };

    window.setQ=(q)=>{
      state.questionId=q;
      state.mode="question";
      state.acceptingAnswers=false;
      update();
    };

    window.showAnswer=()=>{
      state.mode="answer";
      update();
    };

    window.toggleAnswer=()=>{
      state.acceptingAnswers=!state.acceptingAnswers;
      update();
    };

    // ----------------
    // ✅ ランキング計算
    // ----------------
    window.computeRanking = async ()=>{

      // ✅ players全部取得（1回）
      const snap = await getDocs(collection(db,"players"));

      let arr = [];

      snap.forEach(doc=>{
        const d = doc.data();
        arr.push({
          name: d.name,
          score: d.score || 0
        });
      });

      // ✅ ソート
      arr.sort((a,b)=> b.score - a.score);

      // ✅ 上位10件
      const top10 = arr.slice(0,10);

      // ✅ Firestore保存
      await setDoc(doc(db,"ranking","current"),{
        top10
      });

      // ✅ モード切替
      state.mode="ranking";
      update();
    };

    onSnapshot(doc(db,"game","state"), snap=>{
      document.getElementById("status").innerText =
        JSON.stringify(snap.data(),null,2);
    });

</script>

</body>
</html>
