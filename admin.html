<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
</head>
<body>

<h1>管理画面</h1>

<h2>初期化</h2>
<button onclick="initState()">state初期化</button>

<hr>

<h2>画面状態</h2>

<button onclick="setScreen('join')">参加受付画面</button>
<button onclick="setScreen('waiting')">待機</button>
<button onclick="setScreen('quiz')">問題表示</button>
<button onclick="setScreen('answer')">解答表示</button>
<button onclick="setScreen('ranking')">ランキング</button>

<hr>

<h2>問題選択</h2>

<button onclick="setQuestion(1)">Q1</button>
<button onclick="setQuestion(2)">Q2</button>
<button onclick="setQuestion(3)">Q3</button>

<hr>

<h2>フラグ</h2>

<button onclick="togglePlayers()">参加受付 ON/OFF</button>
<button onclick="toggleAnswers()">回答受付 ON/OFF</button>

<hr>

<h2>現在のstate</h2>
<pre id="status">読み込み中...</pre>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ✅ Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyAJnZ28PHb3DNI0CULeGSARrpFC3IBdLL4",
      authDomain: "quiz-app-97d7c.firebaseapp.com",
      projectId: "quiz-app-97d7c",
      storageBucket: "quiz-app-97d7c.firebasestorage.app",
      messagingSenderId: "255600083342",
      appId: "1:255600083342:web:c4580a6bfc25241c2464df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ✅ state（唯一の正解構造）
    let state = {
      questionId: 1,
      screen: "waiting",
      isAcceptingPlayers: false,
      acceptingAnswers: false
    };

    // =======================
    // ✅ 初期化
    // =======================
    window.initState = async () => {
      await setDoc(doc(db,"game","state"), {
        questionId: 1,
        screen: "waiting",
        isAcceptingPlayers: false,
        acceptingAnswers: false
      }, { merge: false });   // ←重要（完全上書き）
    };

    // =======================
    // ✅ 更新（共通）
    // =======================
    const update = async () => {
      await setDoc(doc(db,"game","state"), state, { merge: false });
    };

    // =======================
    // ✅ 状態変更
    // =======================
    window.setScreen = (s) => {
      state.screen = s;
      update();
    };

    window.setQuestion = (q) => {
      state.questionId = q;
      update();
    };

    window.togglePlayers = () => {
      state.isAcceptingPlayers = !state.isAcceptingPlayers;
      update();
    };

    window.toggleAnswers = () => {
      state.acceptingAnswers = !state.acceptingAnswers;
      update();
    };

    // =======================
    // ✅ 表示
    // =======================
    onSnapshot(doc(db,"game","state"), snap => {

      if (!snap.exists()) {
        document.getElementById("status").innerText = "state未作成（初期化押してください）";
        return;
      }

      state = snap.data();

      document.getElementById("status").innerText =
        JSON.stringify(state, null, 2);
    });

</script>

</body>
</html>
