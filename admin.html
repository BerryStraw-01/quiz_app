<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
</head>

<body>

<h1>管理画面</h1>

<!-- ✅ 初期（待機に戻す） -->
<button onclick="reset()">初期画面に戻る</button>

<hr>

<h2>状態操作</h2>

<button onclick="startJoin()">参加受付</button>

<!-- ✅ ここが追加された待機ボタン -->
<button onclick="goWaiting()">待機画面</button>

<button onclick="showAnswer()">解答表示</button>
<button onclick="showRanking()">ランキング</button>

<hr>

<h2>問題</h2>

<button onclick="setQ(1)">第1問</button>
<button onclick="setQ(2)">第2問</button>

<hr>

<h2>回答操作</h2>

<button onclick="toggleAnswer()">回答 ON / OFF</button>

<hr>

<pre id="status"></pre>

<script type="module">

    import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {getFirestore,doc,setDoc,onSnapshot} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSyAJnZ28PHb3DNI0CULeGSARrpFC3IBdLL4",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let state = {
      mode:"waiting",
      questionId:1,
      acceptingAnswers:false
    };

    // 更新
    const update = ()=>{
      setDoc(doc(db,"game","state"),state,{merge:false});
    };

    // ----------------
    // ✅ 初期
    // ----------------
    window.reset = ()=>{
      state.mode = "waiting";
      state.acceptingAnswers = false;
      update();
    };

    // ----------------
    // ✅ 待機ボタン（今回追加）
    // ----------------
    window.goWaiting = ()=>{
      state.mode = "waiting";
      state.acceptingAnswers = false; // 安全にOFF
      update();
    };

    // ----------------
    // ✅ 参加受付
    // ----------------
    window.startJoin = ()=>{
      state.mode="join";
      update();
    };

    // ----------------
    // ✅ 問題
    // ----------------
    window.setQ = (q)=>{
      state.questionId = q;
      state.mode = "question";
      state.acceptingAnswers = false;
      update();
    };

    // ----------------
    // ✅ 解答
    // ----------------
    window.showAnswer = ()=>{
      state.mode="answer";
      update();
    };

    window.showRanking = ()=>{
      state.mode="ranking";
      update();
    };

    // ----------------
    // ✅ 回答ON/OFF
    // ----------------
    window.toggleAnswer = ()=>{
      state.acceptingAnswers = !state.acceptingAnswers;
      update();
    };

    // 状態表示
    onSnapshot(doc(db,"game","state"),snap=>{
      document.getElementById("status").innerText =
        JSON.stringify(snap.data(),null,2);
    });

</script>

</body>
</html>
