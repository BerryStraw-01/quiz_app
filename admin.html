<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
</head>

<body>

<h1>管理画面</h1>

<!-- ✅ 完全リセット -->
<button onclick="reset()">初期画面に戻る（全削除）</button>

<hr>

<h2>状態操作</h2>

<button onclick="startJoin()">参加受付</button>
<button onclick="goWaiting()">待機画面</button>
<button onclick="showAnswer()">解答表示</button>
<button onclick="showRanking()">ランキング表示</button>

<hr>

<h2>問題</h2>

<button onclick="setQ(1)">第1問</button>
<button onclick="setQ(2)">第2問</button>

<hr>

<h2>回答操作</h2>

<button onclick="toggleAnswer()">回答 ON / OFF</button>

<hr>

<pre id="status"></pre>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,doc,setDoc,onSnapshot,
      collection,getDocs,deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSyAJnZ28PHb3DNI0CULeGSARrpFC3IBdLL4",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let state = {
      mode:"waiting",
      questionId:1,
      acceptingAnswers:false
    };

    const update = ()=> {
      setDoc(doc(db,"game","state"),state,{merge:false});
    };

    // ----------------
    // ✅ ✅ ✅ 完全リセット（ここが今回の核心）
    // ----------------
    window.reset = async ()=>{

      // ① state初期化
      state.mode = "waiting";
      state.acceptingAnswers = false;
      state.questionId = 1;

      await setDoc(doc(db,"game","state"), state, {merge:false});

      // ----------------
      // ② players 全削除
      // ----------------
      const playersSnap = await getDocs(collection(db,"players"));

      for(const p of playersSnap.docs){
        await deleteDoc(p.ref);
      }

      // ----------------
      // ③ answers 全削除
      // ----------------
      const answersSnap = await getDocs(collection(db,"answers"));

      for(const qDoc of answersSnap.docs){

        const usersSnap = await getDocs(
          collection(db,"answers",qDoc.id,"users")
        );

        for(const u of usersSnap.docs){
          await deleteDoc(u.ref);
        }
      }

      // ----------------
      // ④ ranking 初期化
      // ----------------
      await setDoc(doc(db,"ranking","current"),{
        top10:[]
      });

    };

    // ----------------
    // ✅ 通常操作
    // ----------------

    window.goWaiting = ()=>{
      state.mode = "waiting";
      state.acceptingAnswers = false;
      update();
    };

    window.startJoin = ()=>{
      state.mode="join";
      update();
    };

    window.setQ = (q)=>{
      state.questionId = q;
      state.mode = "question";
      state.acceptingAnswers = false;
      update();
    };

    window.showAnswer = ()=>{
      state.mode="answer";
      update();
    };

    window.showRanking = ()=>{
      state.mode="ranking";
      update();
    };

    window.toggleAnswer = ()=>{
      state.acceptingAnswers = !state.acceptingAnswers;
      update();
    };

    onSnapshot(doc(db,"game","state"),snap=>{
      document.getElementById("status").innerText =
        JSON.stringify(snap.data(),null,2);
    });

</script>

</body>
</html>
