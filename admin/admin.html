<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
<div class="phone">

    <h1 class="title">管理画面</h1>

    <!-- 参加人数 -->
    <div class="pill-center">
        <div id="playerCount" class="pill-text">
      <span class="pill-icon">
        <!-- 人アイコン -->
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="7" r="3"/>
          <path d="M6 18c0-3 3-5 6-5s6 2 6 5"/>
        </svg>
      </span>
            参加人数：0人
        </div>
    </div>

    <!-- 進行ボタン -->
    <div class="card">
        <div class="mode-row">

            <button id="btnJoin" class="mode-btn blue">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="7" r="3"/>
                    <path d="M6 18c0-3 3-5 6-5s6 2 6 5"/>
                </svg>
                <span>参加受付</span>
            </button>

            <button id="btnWait" class="mode-btn blue">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="8"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="12" x2="15" y2="14"/>
                </svg>
                <span>待機</span>
            </button>

            <button id="btnRanking" class="mode-btn blue">
                <svg viewBox="0 0 24 24"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.4"
                     stroke-linecap="round"
                     stroke-linejoin="round">

                    <!-- カップ本体 -->
                    <path d="M6 4h12v5c0 4-3 6-6 7-3-1-6-3-6-7z"/>

                    <!-- 左持ち手（外側・短め） -->
                    <path d="M6 6H4c0 3 1.4 5 2 2.6"/>

                    <!-- 右持ち手（外側・短め） -->
                    <path d="M18 6h2c0 3-1.4 5-2 2.6"/>

                    <!-- 中央の星 -->
                    <path d="
    M12 7.2
    l0.8 1.6
    1.8 0.3
    -1.3 1.2
    0.3 1.8
    -1.6 -0.8
    -1.6 0.8
    0.3 -1.8
    -1.3 -1.2
    1.8 -0.3
    z
  "/>

                    <!-- 支柱 -->
                    <line x1="12" y1="16" x2="12" y2="20"/>

                    <!-- 台座 -->
                    <line x1="9" y1="20" x2="15" y2="20"/>

                </svg>
                <span>ランキング</span>
            </button>

            <button id="btnAnswer" class="mode-btn green">
                <svg viewBox="0 0 24 24">
                    <rect x="4" y="4" width="16" height="16" rx="3"/>
                    <path d="M7.5 12l3 3 6-6"/>
                </svg>
                <span>解答</span>
            </button>

            <button id="btnQuestion" class="mode-btn yellow">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="8"/>
                    <path d="M9 9a3 3 0 1 1 6 2c-2 1-3 2-3 4"/>
                    <circle cx="12" cy="17" r="0.8"/>
                </svg>
                <span>問題</span>
            </button>

        </div>
    </div>

    <!-- 回答 ON/OFF -->
    <div class="card toggle-card">
        <div class="toggle-left">
            <div class="toggle-check">✓</div>
            <div class="toggle-text">
                <div class="toggle-title">回答：ON</div>
                <div class="toggle-sub">回答を受け付けています</div>
            </div>
        </div>
        <div id="btnToggle" class="ios-toggle"></div>
    </div>

    <!-- タブ -->
    <div class="card">
        <div class="tab-bar">
            <button id="tab-q" class="tab active">問題選択</button>
            <button id="tab-a" class="tab">回答状況</button>
        </div>

        <div id="tab-q-area">
            <div id="questionList"></div>
        </div>

        <div id="tab-a-area" style="display:none;">
            <div id="answerStatus" class="answer-panel"></div>
        </div>
    </div>

    <!-- 初期化 -->
    <button class="reset">
    <span class="reset-icon">
      <svg viewBox="0 0 24 24">
        <path d="M4 12a8 8 0 1 1 5.5 7.5"/>
        <polyline points="4 5 4 11 10 11"/>
      </svg>
    </span>
        初期化（リセット）
    </button>

</div>

<script type="module" src="admin.js"></script>
</body>
</html>
