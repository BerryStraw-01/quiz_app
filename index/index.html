<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>クイズ</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

<div class="bg">
        <div class="bg-sparkle s1"></div>
        <div class="bg-sparkle s2"></div>
        <div class="bg-sparkle s3"></div>
        <div class="bg-sparkle s4"></div>
        <div class="bg-sparkle s5"></div>

        <div class="bg-sparkle s6"></div>
        <div class="bg-sparkle s7"></div>
        <div class="bg-sparkle s8"></div>
        <div class="bg-sparkle s9"></div>
        <div class="bg-sparkle s10"></div>
</div>

<div class="phone">

    <div id="loading">
        <div class="header">
            <div class="title-wrap">
                <h1 class="title">クイズ</h1>
                <div class="title-bar"></div>
            </div>
        </div>
        <div class="card">
            <div class="wait-title">読み込み中…</div>
        </div>
    </div>

    <!-- ======================
         参加画面
    ====================== -->
    <div id="join" style="display:none;">
        <div class="header">
            <div class="title-wrap">
                <h1 class="title">クイズ</h1>
                <div class="title-bar"></div>
            </div>
        </div>

        <div class="card join-card">
            <input id="name" placeholder="名前を入力してください">
            <button id="btnJoin">参加する</button>
        </div>
    </div>

    <!-- ======================
         待機
    ====================== -->
    <div id="wait" style="display:none;">
        <div class="header">
            <h1 class="title">待機中</h1>
            <div class="title-bar"></div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <div class="icon-bg"></div>

                <!-- 砂時計 -->
                <svg class="icon-hourglass" viewBox="0 0 24 24">
                    <defs>
                        <linearGradient id="gradHour" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#4facfe"/>
                            <stop offset="100%" stop-color="#8a6cff"/>
                        </linearGradient>
                    </defs>

                    <path d="M7 5 L17 5 L15 9 L12 12 L9 9 Z"
                          fill="none" stroke="url(#gradHour)" stroke-width="1.6"/>

                    <path d="M9 15 L12 12 L15 15 L17 19 L7 19 Z"
                          fill="none" stroke="url(#gradHour)" stroke-width="1.6"/>

                    <path d="M8.5 8.0 L15.5 8.0 L14.2 10.5 L12 12 L9.8 10.5 Z"
                          fill="url(#gradHour)" opacity="0.85"/>

                    <circle cx="12" cy="15.2" r="0.7" fill="url(#gradHour)"/>
                </svg>
            </div>

            <div class="wait-title">待機中です</div>
            <div class="wait-sub">クイズの開始をお待ちください</div>
        </div>
    </div>

    <!-- ======================
         参加不可
    ====================== -->
    <div id="blocked" style="display:none;">
        <div class="header">
            <div class="title-wrap">
                <h1 class="title">クイズ</h1>
                <div class="title-bar"></div>
            </div>
        </div>

        <div class="card blocked-card">
            <div class="icon-wrap">
                <div class="icon-bg"></div>

                <svg class="icon-hourglass" viewBox="0 0 24 24">
                    <defs>
                        <linearGradient id="gradX" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#4facfe"/>
                            <stop offset="100%" stop-color="#8a6cff"/>
                        </linearGradient>
                    </defs>

                    <line x1="6" y1="6" x2="18" y2="18"
                          stroke="url(#gradX)"
                          stroke-width="2.8"
                          stroke-linecap="round"/>

                    <line x1="18" y1="6" x2="6" y2="18"
                          stroke="url(#gradX)"
                          stroke-width="2.8"
                          stroke-linecap="round"/>
                </svg>
            </div>

            <div class="wait-title">参加できません</div>
            <div class="wait-sub">クイズの開始をお待ちください</div>
        </div>
    </div>

    <!-- ======================
         クイズ画面
    ====================== -->
    <div id="quiz" style="display:none;">

        <div class="header">
            <h1 class="title">クイズ</h1>
            <div class="title-bar"></div>
        </div>

        <div class="card quiz-card">

            <div id="q"></div>
            <img id="qImg">

            <div id="choices"></div>
            <div id="quizStatus" class="quiz-status"></div>

            <!-- ✅ 結果表示（ここが重要） -->
            <div id="answerResult" class="answer-result" style="display:none;">

                <!-- ✅ 判定表示（追加） -->
                <div id="answerJudge" class="answer-judge-global" style="display:none;"></div>

                <div class="answer-detail">
                    あなたの解答：<span id="myAnswer"></span>
                </div>

                <div class="answer-detail">
                    正解：<span id="correctAnswer"></span>
                </div>

                <div class="score-text">
                    現在のスコア：<span id="score"></span>
                </div>

                <div id="explainText" class="explain-text" style="display:none;"></div>
                <img id="explainImg" class="explain-img" style="display:none;">

            </div>

        </div>
    </div>

    <!-- ======================
         ランキング
    ====================== -->
    <div id="ranking" style="display:none;">

        <div class="header">
            <h1 class="title">ランキング</h1>
            <div class="title-bar"></div>
        </div>

        <div class="card">

            <!-- ✅ JSがここにランキング行を差し込む -->
            <div id="rankList" class="ranking-list">
                <!--
                  JS側で生成される想定：

                  <div class="rank-row rank1">
                    <div class="rank">1</div>
                    <div class="rank-name">Alice</div>
                    <div class="rank-score">5点</div>
                  </div>

                  <div class="rank-row rank2">...</div>
                  <div class="rank-row rank3">...</div>
                -->
            </div>

        </div>

    </div>

</div>

<script type="module" src="index.js"></script>
</body>
</html>
