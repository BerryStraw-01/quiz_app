<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>クイズ</title>

    <!-- ✅ これが最重要 -->
    <link rel="stylesheet" href="index.css">

</head>

<body>
<div class="bg"></div> <!-- ✅ これ必須 -->
<div class="phone">

    <div class="header">
        <div class="title-wrap">

            <div class="sparkle title-s1"></div>
            <div class="sparkle title-s2"></div>
            <div class="sparkle title-s3"></div>
            <div class="sparkle title-s4"></div>

            <h1 class="title">クイズ</h1>
            <div class="title-bar"></div>

        </div>
    </div>

    <div class="card">

        <div class="icon-wrap">

            <div class="icon-bg"></div>

            <div class="sparkle-card s1"></div>
            <div class="sparkle-card s2"></div>
            <div class="sparkle-card s3"></div>
            <div class="sparkle-card s4"></div>
            <div class="sparkle-card s5"></div>
            <div class="sparkle-card s6"></div>

            <!-- ✅ バツ -->
            <svg class="icon-hourglass" viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="gradX" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#4facfe"/>
                        <stop offset="100%" stop-color="#8a6cff"/>
                    </linearGradient>
                </defs>

                <line x1="6" y1="6" x2="18" y2="18"
                      stroke="url(#gradX)" stroke-width="2.5" stroke-linecap="round"/>
                <line x1="18" y1="6" x2="6" y2="18"
                      stroke="url(#gradX)" stroke-width="2.5" stroke-linecap="round"/>
            </svg>

        </div>

        <h2 class="wait-title">参加できません</h2>
        <p class="wait-sub">クイズの開始をお待ちください</p>

    </div>

</div>

</body>
</html>
