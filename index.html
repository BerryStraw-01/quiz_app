<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <style>
        body{text-align:center;font-family:sans-serif;}

        #choices{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        width:80%;
        margin:auto;
        }

        .choice{
        padding:20px;
        border-radius:10px;
        color:white;
        cursor:pointer;
        }

        .c0{background:red;}
        .c1{background:blue;}
        .c2{background:orange;color:black;}
        .c3{background:green;}

        .dim{opacity:0.3;}
        .selected{outline:4px solid white;}

        .choice.disabled{
        pointer-events:none;
        opacity:0.4;
        }
    </style>
</head>

<body>

<h1>クイズ</h1>

<div id="join">
    <p id="joinStatus"></p>
    <input id="name">
    <button onclick="join()">参加</button>
</div>

<div id="wait" style="display:none;">
    <h2>待機中</h2>
    <p id="waitText"></p>
</div>

<div id="blocked" style="display:none;">
    <h2>現在参加できません</h2>
</div>

<div id="quiz" style="display:none;">
    <h2 id="q"></h2>
    <div id="choices"></div>
    <p id="result"></p>
    <p id="answerText"></p>
    <p id="scoreText"></p> <!-- ✅ スコア表示 -->
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
    getFirestore,addDoc,collection,doc,getDoc,setDoc,onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
    apiKey:"AIzaSy...",
    authDomain:"quiz-app-97d7c.firebaseapp.com",
    projectId:"quiz-app-97d7c"
    }));

    let userId = localStorage.getItem("userId");
    let myChoice=null;
    let lastQ=null;

    // ----------------
    // UI切替
    // ----------------
    function show(id){
    ["join","wait","quiz","blocked"].forEach(x=>{
    document.getElementById(x).style.display="none";
    });
    document.getElementById(id).style.display="block";
    }

    // ----------------
    // ✅ プレイヤー存在確認
    // ----------------
    async function validateUser(){

    if(!userId) return false;

    const snap = await getDoc(doc(db,"players",userId));

    if(!snap.exists()){
    userId=null;
    localStorage.removeItem("userId");
    return false;
    }

    return true;
    }

    // ----------------
    // ✅ 参加
    // ----------------
    window.join = async ()=>{

    const s = (await getDoc(doc(db,"game","state"))).data();
    if(s.mode !== "join") return;

    const name=document.getElementById("name").value;
    if(!name) return;

    const ref = await addDoc(collection(db,"players"),{
    name,
    score:0
    });

    userId = ref.id;
    localStorage.setItem("userId",userId);

    show("wait");
    };

    // ----------------
    // ✅ スコア加算（重要）
    // ----------------
    async function addScore(q){

    const ansRef = doc(db,"answers","q"+lastQ,"users",userId);
    const ansSnap = await getDoc(ansRef);

    if(!ansSnap.exists()) return;

    const ans = ansSnap.data();

    // ✅ 二重加算防止
    if(ans.scored) return;

    if(ans.choice !== q.answer) return;

    // ✅ 加算
    const playerRef = doc(db,"players",userId);
    const playerSnap = await getDoc(playerRef);

    const score = playerSnap.data().score || 0;

    await setDoc(playerRef,{
    score: score + 1
    },{merge:true});

    // ✅ フラグ更新
    await setDoc(ansRef,{
    scored:true
    },{merge:true});
    }

    // ----------------
    // ✅ 選択肢生成
    // ----------------
    function buildChoices(q,s,showAnswer){

    let html="";
    const label=["①","②","③","④"];

    q.choices.forEach((c,i)=>{

    let cls="choice c"+i;

    // 回答中
    if(!showAnswer && myChoice!==null){
    if(i!==myChoice) cls+=" dim";
    }

    // 解答表示
    if(showAnswer){
    if(i!==q.answer) cls+=" dim";
    }

    if(i===myChoice) cls+=" selected";

    if(!s.acceptingAnswers) cls+=" disabled";

    html+=`
    <div class="${cls}" onclick="answer(${i})">
    ${label[i]} ${c}
    </div>`;
    });

    return html;
    }

    // ----------------
    // ✅ state監視
    // ----------------
    onSnapshot(doc(db,"game","state"), async snap=>{

    const s = snap.data();
    if(!s) return;

    // ✅ プレイヤー検証
    const valid = await validateUser();

    // ✅ 問題変更でリセット
    if(s.questionId !== lastQ){
    lastQ = s.questionId;
    myChoice=null;
    document.getElementById("result").innerText="";
    document.getElementById("answerText").innerText="";
    document.getElementById("scoreText").innerText="";
    }

    // 未参加
    if(!valid){

    if(s.mode==="join"){
    show("join");
    }else{
    show("blocked");
    }

    return;
    }

    // 待機
    if(s.mode==="waiting"){
    show("wait");
    return;
    }

    // 問題
    if(s.mode==="question"){

    show("quiz");

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("q").innerText=q.text;

    document.getElementById("choices").innerHTML=
    buildChoices(q,s,false);

    return;
    }

    // 解答
    if(s.mode==="answer"){

    show("quiz");

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("q").innerText=q.text;

    document.getElementById("choices").innerHTML=
    buildChoices(q,s,true);

    // 正誤
    document.getElementById("result").innerText =
    (myChoice===q.answer)?"正解":"不正解";

    document.getElementById("answerText").innerText =
    "正解は "+(q.answer+1)+" 番";

    // ✅ スコア処理
    await addScore(q);

    // ✅ スコア取得表示
    const player=(await getDoc(doc(db,"players",userId))).data();

    document.getElementById("scoreText").innerText =
    "現在のスコア: " + player.score;

    return;
    }

    });

    // ----------------
    // ✅ 回答
    // ----------------
    window.answer = async (i)=>{

    const s=(await getDoc(doc(db,"game","state"))).data();

    if(s.mode==="answer") return;
    if(!s.acceptingAnswers) return;

    myChoice=i;

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("choices").innerHTML=
    buildChoices(q,s,false);

    await setDoc(
    doc(db,"answers","q"+s.questionId,"users",userId),
    {choice:i,scored:false}
    );

    };

</script>
</body>
</html>
