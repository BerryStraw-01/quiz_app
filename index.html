<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <style>

        /* =====================
           全画面
        ===================== */
        html, body{
          height:100%;
          margin:0;
        }

        body{
          font-family:sans-serif;
          background:#f5f5f5;
          text-align:center;
          font-size:28px;
        }

        /* =====================
           画面を最大化
        ===================== */
        .screen{
          width:100%;
          min-height:100vh;
          box-sizing:border-box;
          padding:20px;
        }

        /* =====================
           問題
        ===================== */
        #q{
          font-size:40px;
          margin:25px 0;
        }

        /* =====================
           選択肢
        ===================== */
        #choices{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:20px;
        }

        .choice{
          padding:40px;
          font-size:30px;
          border-radius:20px;
          color:white;
        }

        .c0{background:#e74c3c;}
        .c1{background:#3498db;}
        .c2{background:#f1c40f;color:black;}
        .c3{background:#2ecc71;}

        .dim{opacity:0.3;}
        .selected{outline:8px solid black;}

        .choice.disabled{
          opacity:0.3;
          pointer-events:none;
        }

        .choice.answer-correct{
          opacity:1 !important;
        }

        /* =====================
           名前入力（ここ改善）
        ===================== */

        #name{
          width:90%;
          padding:20px;
          font-size:28px;
          border-radius:12px;
          border:3px solid #5cc8ff;
          outline:none;
        }

        #join button{
          margin-top:20px;
          width:90%;
          padding:20px;
          font-size:28px;
          border:none;
          border-radius:12px;
          background:#5cc8ff;
          color:white;
        }

        /* =====================
           結果
        ===================== */

        #result{
          font-size:36px;
        }

        #scoreText{
          font-size:32px;
          font-weight:bold;
        }

        /* =====================
           ランキング
        ===================== */

        .rank{
          padding:20px;
          margin:10px;
          border-radius:12px;
          font-size:30px;
        }

        .top1{background:#ffe066;}
        .top2{background:#e0e0e0;}
        .top3{background:#f5c993;}
        .normal{background:white;border:2px solid #ccc;}

    </style>
</head>

<body>

<h1>クイズ</h1>

<!-- 参加 -->
<div id="join" class="screen">
    <h2>名前を入力して参加</h2>
    <input id="name" placeholder="名前を入力">
    <button onclick="join()">参加する</button>
</div>

<!-- 待機 -->
<div id="wait" class="screen" style="display:none;">
    <h2>待機中</h2>
</div>

<!-- ブロック -->
<div id="blocked" class="screen" style="display:none;">
    <h2>現在参加できません</h2>
</div>

<!-- 問題 -->
<div id="quiz" class="screen" style="display:none;">
    <h2 id="q"></h2>
    <div id="choices"></div>

    <p id="result"></p>
    <p id="answerText"></p>
    <p id="scoreText"></p>
</div>

<!-- ランキング -->
<div id="ranking" class="screen" style="display:none;">
    <h2>ランキング</h2>
    <div id="rankList"></div>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, addDoc, collection, doc,
      getDoc, setDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSy...",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let userId = localStorage.getItem("userId");
    let myChoice=null;
    let lastQ=null;

    /* 画面 */
    function show(id){
    ["join","wait","quiz","blocked","ranking"].forEach(x=>{
    document.getElementById(x).style.display="none";
    });
    document.getElementById(id).style.display="block";
    }

    /* ユーザー確認 */
    async function validateUser(){
    if(!userId) return false;

    const snap = await getDoc(doc(db,"players",userId));
    if(!snap.exists()){
    localStorage.removeItem("userId");
    userId=null;
    return false;
    }
    return true;
    }

    /* 参加 */
    window.join = async ()=>{

    const s = (await getDoc(doc(db,"game","state"))).data();
    if(s.mode!=="join") return;

    const name=document.getElementById("name").value;
    if(!name)return;

    const ref = await addDoc(collection(db,"players"),{
    name, score:0
    });

    userId=ref.id;
    localStorage.setItem("userId",userId);

    show("wait");
    };

    /* =====================
       state
    ===================== */
    onSnapshot(doc(db,"game","state"), async snap=>{

    const s=snap.data();
    if(!s)return;

    const valid=await validateUser();

    if(s.questionId!==lastQ){
    lastQ=s.questionId;
    myChoice=null;

    document.getElementById("result").innerText="";
    document.getElementById("answerText").innerText="";
    document.getElementById("scoreText").innerText="";
    document.getElementById("choices").innerHTML="";
    }

    if(!valid){
    if(s.mode==="join") show("join");
    else show("blocked");
    return;
    }

    if(s.mode==="waiting"){show("wait"); return;}

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    if(s.mode==="question"){
    show("quiz");
    render(q,s,false);
    }

    if(s.mode==="answer"){
    show("quiz");
    render(q,s,true);

    document.getElementById("result").innerText =
    (myChoice===q.answer)?"正解":"不正解";

    document.getElementById("answerText").innerText =
    "正解は "+(q.answer+1);
    }

    if(s.mode==="ranking"){
    show("ranking");

    const r=await getDoc(doc(db,"ranking","current"));
    let html="";

    r.data().top10.forEach((p,i)=>{
    let cls="rank normal";
    if(i===0) cls="rank top1";
    else if(i===1) cls="rank top2";
    else if(i===2) cls="rank top3";

    html+=`<div class="${cls}">
    ${i+1}位 ${p.name} ${p.score}点
    </div>`;
    });

    document.getElementById("rankList").innerHTML=html;
    }

    });

    /* 描画 */
    function render(q,s,showAnswer){

    let html="";
    const label=["①","②","③","④"];

    q.choices.forEach((c,i)=>{

    let cls="choice c"+i;

    if(showAnswer){
    if(i===q.answer) cls+=" answer-correct";
    else cls+=" dim";
    }

    if(!showAnswer && myChoice!==null && i!==myChoice){
    cls+=" dim";
    }

    if(i===myChoice) cls+=" selected";

    const click = (s.acceptingAnswers&&!showAnswer)
    ? `onclick="answer(${i})"` : "";

    if(!s.acceptingAnswers && !showAnswer){
    cls+=" disabled";
    }

    html+=`<div class="${cls}" ${click}>
    ${label[i]} ${c}
    </div>`;
    });

    document.getElementById("choices").innerHTML=html;
    }

    /* 回答 */
    window.answer = async (i)=>{

    const s=(await getDoc(doc(db,"game","state"))).data();
    if(!s.acceptingAnswers || s.mode==="answer") return;

    myChoice=i;

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();
    render(q,s,false);

    await setDoc(doc(db,"answers","q"+s.questionId,"users",userId),
    {choice:i,scored:false});
    };

</script>
</body>
</html>
