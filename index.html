<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <style>
        body {
          font-family: sans-serif;
          text-align: center;
        }

        /* 問題 */
        #question {
          font-size: 28px;
          margin: 20px;
        }

        /* 選択肢エリア */
        #choices {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 15px;
          width: 80%;
          margin: auto;
        }

        /* ボタン */
        .choiceBtn {
          padding: 20px;
          font-size: 18px;
          border: none;
          border-radius: 10px;
          cursor: pointer;
          color: white;
        }

        /* 色分け（Kahoot風） */
        .c0 { background: #e74c3c; }
        .c1 { background: #3498db; }
        .c2 { background: #f1c40f; color: black; }
        .c3 { background: #2ecc71; }

        .choiceBtn:disabled {
          opacity: 0.4;
          cursor: not-allowed;
        }
    </style>
</head>

<body>

<h1>クイズ</h1>

<!-- 参加 -->
<div id="joinScreen">
    <p id="joinStatus">読み込み中...</p>
    <input id="nameInput" placeholder="名前">
    <button onclick="join()">参加</button>
</div>

<!-- 待機 -->
<div id="waitingScreen" style="display:none;">
    <h2>待機中</h2>
</div>

<!-- 問題 -->
<div id="quizScreen" style="display:none;">
    <h2 id="question"></h2>
    <div id="choices"></div>
    <p id="result"></p>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      doc,
      getDoc,
      setDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAJnZ28PHb3DNI0CULeGSARrpFC3IBdLL4",
      authDomain: "quiz-app-97d7c.firebaseapp.com",
      projectId: "quiz-app-97d7c",
      storageBucket: "quiz-app-97d7c.firebasestorage.app",
      messagingSenderId: "255600083342",
      appId: "1:255600083342:web:c4580a6bfc25241c2464df"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = "";
    let currentState = null;

    // =======================
    // ✅ 参加
    // =======================
    window.join = async () => {

      if (!currentState || !currentState.isAcceptingPlayers) {
        alert("現在は参加できません");
        return;
      }

      const name = document.getElementById("nameInput").value;

      if (!name) {
        alert("名前を入力してください");
        return;
      }

      const ref = await addDoc(collection(db,"players"), {
        name,
        score: 0
      });

      userId = ref.id;

      alert("参加しました！");
    };

    // =======================
    // ✅ 画面切替
    // =======================
    function show(id){
      ["joinScreen","waitingScreen","quizScreen"]
        .forEach(x => document.getElementById(x).style.display="none");

      document.getElementById(id).style.display="block";
    }

    // =======================
    // ✅ state監視
    // =======================
    onSnapshot(doc(db,"game","state"), async snap => {

      if (!snap.exists()) return;

      const s = snap.data();
      currentState = s;

      // 参加状態表示
      document.getElementById("joinStatus").innerText =
        s.isAcceptingPlayers ? "✅ 参加受付中" : "❌ 参加受付していません";

      document.querySelector("#joinScreen button").disabled =
        !s.isAcceptingPlayers;

      // =================
      // 画面制御
      // =================

      if(s.screen === "join"){
        show("joinScreen");
        return;
      }

      if(s.screen === "waiting"){
        show("waitingScreen");
        return;
      }

      if(s.screen === "quiz"){
        show("quizScreen");

        await loadQuestion(s.questionId);

        // ✅ ボタンON/OFF
        document.querySelectorAll(".choiceBtn")
          .forEach(btn => btn.disabled = !s.acceptingAnswers);
      }

    });

    // =======================
    // ✅ 問題表示（重要改善部分）
    // =======================
    async function loadQuestion(id){

      const snap = await getDoc(doc(db,"questions","q"+id));
      const data = snap.data();

      if (!data) return;

      document.getElementById("question").innerText = data.text;

      let html = "";

      const labels = ["①", "②", "③", "④"];

      data.choices.forEach((c,i)=>{
        html += `
          <button class="choiceBtn c${i}" onclick="answer(${i})">
            ${labels[i]} ${c}
          </button>
        `;
      });

      document.getElementById("choices").innerHTML = html;
    }

    // =======================
    // ✅ 回答
    // =======================
    window.answer = async (num) => {

      document.getElementById("result").innerText =
        `${num + 1}番を選択しました`;

      await setDoc(
        doc(db,"answers","q"+currentState.questionId,"users",userId),
        { choice:num }
      );
    };

</script>
</body>
</html>
