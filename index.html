<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <style>

        /* =====================
           ベース
        ===================== */

        body{
          text-align:center;
          font-family:sans-serif;
          margin:0;
          background:#f5f5f5;
        }

        h1{
          margin:10px;
        }

        /* =====================
           カード
        ===================== */

        .card{
          background:white;
          margin:10px;
          padding:15px;
          border-radius:15px;
          box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        /* =====================
           ボタン
        ===================== */

        button{
          padding:10px 20px;
          border:none;
          border-radius:10px;
          background:#333;
          color:white;
          font-size:16px;
        }

        /* =====================
           選択肢
        ===================== */

        #choices{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:10px;
        }

        .choice{
          padding:18px;
          border-radius:12px;
          font-size:18px;
          color:white;
        }

        .c0{background:#e74c3c;}
        .c1{background:#3498db;}
        .c2{background:#f1c40f;color:black;}
        .c3{background:#2ecc71;}

        .dim{opacity:0.3;}
        .selected{outline:3px solid black;}

        .choice.disabled{
          pointer-events:none;
          opacity:0.4;
        }

        /* =====================
           ランキング
        ===================== */

        .rank{
          padding:12px;
          margin:6px;
          border-radius:10px;
          text-align:left;
          font-size:18px;
        }

        .top1{
          background:#ffe066;
          font-weight:bold;
        }

        .top2{
          background:#e0e0e0;
        }

        .top3{
          background:#f5c993;
        }

        .normal{
          background:white;
          border:1px solid #ddd;
        }

    </style>
</head>

<body>

<h1>クイズ</h1>

<!-- =====================
     参加
===================== -->
<div id="join" class="card">
    <p id="joinStatus"></p>
    <input id="name" placeholder="名前">
    <br><br>
    <button onclick="join()">参加</button>
</div>

<!-- =====================
     待機
===================== -->
<div id="wait" class="card" style="display:none;">
    <h2>待機中</h2>
    <p id="waitText"></p>
</div>

<!-- =====================
     ブロック
===================== -->
<div id="blocked" class="card" style="display:none;">
    <h2>現在参加できません</h2>
</div>

<!-- =====================
     問題
===================== -->
<div id="quiz" class="card" style="display:none;">

    <h2 id="q"></h2>

    <div id="choices"></div>

    <p id="result"></p>
    <p id="answerText"></p>
    <p id="scoreText"></p>

</div>

<!-- =====================
     ランキング
===================== -->
<div id="ranking" class="card" style="display:none;">
    <h2>ランキング</h2>
    <div id="rankList"></div>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
    getFirestore,addDoc,collection,doc,getDoc,setDoc,onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
    apiKey:"AIzaSy...",
    authDomain:"quiz-app-97d7c.firebaseapp.com",
    projectId:"quiz-app-97d7c"
    }));

    let userId = localStorage.getItem("userId");
    let myChoice=null;
    let lastQ=null;

    /* =====================
       画面切替
    ===================== */
    function show(id){
    ["join","wait","quiz","blocked","ranking"].forEach(x=>{
    document.getElementById(x).style.display="none";
    });
    document.getElementById(id).style.display="block";
    }

    /* =====================
       プレイヤー確認
    ===================== */
    async function validateUser(){

    if(!userId) return false;

    const snap = await getDoc(doc(db,"players",userId));

    if(!snap.exists()){
    userId=null;
    localStorage.removeItem("userId");
    return false;
    }

    return true;
    }

    /* =====================
       参加
    ===================== */
    window.join = async ()=>{

    const s = (await getDoc(doc(db,"game","state"))).data();
    if(s.mode !== "join") return;

    const name=document.getElementById("name").value;
    if(!name)return;

    const ref = await addDoc(collection(db,"players"),{
    name,
    score:0
    });

    userId = ref.id;
    localStorage.setItem("userId",userId);

    show("wait");
    };

    /* =====================
       スコア加算
    ===================== */
    async function addScore(q){

    const ansRef = doc(db,"answers","q"+lastQ,"users",userId);
    const ansSnap = await getDoc(ansRef);

    if(!ansSnap.exists()) return;

    const ans = ansSnap.data();

    if(ans.scored) return;
    if(ans.choice !== q.answer) return;

    const playerRef = doc(db,"players",userId);
    const playerSnap = await getDoc(playerRef);

    const score = playerSnap.data().score || 0;

    await setDoc(playerRef,{score: score+1},{merge:true});
    await setDoc(ansRef,{scored:true},{merge:true});
    }

    /* =====================
       選択肢生成
    ===================== */
    function buildChoices(q,s,showAnswer){

    let html="";
    const label=["①","②","③","④"];

    q.choices.forEach((c,i)=>{

    let cls="choice c"+i;

    if(!showAnswer && myChoice!==null && i!==myChoice) cls+=" dim";
    if(showAnswer && i!==q.answer) cls+=" dim";
    if(i===myChoice) cls+=" selected";
    if(!s.acceptingAnswers) cls+=" disabled";

    html+=`
    <div class="${cls}" onclick="answer(${i})">
    ${label[i]} ${c}
    </div>`;
    });

    return html;
    }

    /* =====================
       state監視
    ===================== */
    onSnapshot(doc(db,"game","state"), async snap=>{

    const s = snap.data();
    if(!s) return;

    const valid = await validateUser();

    if(s.questionId!==lastQ){
    lastQ=s.questionId;
    myChoice=null;
    document.getElementById("result").innerText="";
    document.getElementById("answerText").innerText="";
    document.getElementById("scoreText").innerText="";
    }

    // 未参加
    if(!valid){
    if(s.mode==="join") show("join");
    else show("blocked");
    return;
    }

    // 待機
    if(s.mode==="waiting"){
    show("wait");
    return;
    }

    // 問題
    if(s.mode==="question"){

    show("quiz");

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("q").innerText=q.text;
    document.getElementById("choices").innerHTML=
    buildChoices(q,s,false);

    return;
    }

    // 解答
    if(s.mode==="answer"){

    show("quiz");

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("q").innerText=q.text;
    document.getElementById("choices").innerHTML=
    buildChoices(q,s,true);

    document.getElementById("result").innerText =
    (myChoice===q.answer)?"正解":"不正解";

    document.getElementById("answerText").innerText =
    "正解は "+(q.answer+1)+" 番";

    await addScore(q);

    const player=(await getDoc(doc(db,"players",userId))).data();

    document.getElementById("scoreText").innerText =
    "スコア: "+player.score;

    return;
    }

    // ランキング
    if(s.mode==="ranking"){

    show("ranking");

    const snapRank = await getDoc(doc(db,"ranking","current"));
    if(!snapRank.exists()) return;

    const list = snapRank.data().top10;

    let html="";

    list.forEach((p,i)=>{

    let cls="rank";

    if(i===0) cls+=" top1";
    else if(i===1) cls+=" top2";
    else if(i===2) cls+=" top3";
    else cls+=" normal";

    html+=`
    <div class="${cls}">
    ${i+1}位　${p.name}　${p.score}点
    </div>`;
    });

    document.getElementById("rankList").innerHTML=html;

    }

    });

    /* =====================
       回答
    ===================== */
    window.answer = async (i)=>{

    const s=(await getDoc(doc(db,"game","state"))).data();

    if(s.mode==="answer") return;
    if(!s.acceptingAnswers) return;

    myChoice=i;

    const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

    document.getElementById("choices").innerHTML=
    buildChoices(q,s,false);

    await setDoc(doc(db,"answers","q"+s.questionId,"users",userId),
    {choice:i,scored:false});

    };

</script>
</body>
</html>
