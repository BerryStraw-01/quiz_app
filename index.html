<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>クイズ</title>

    <style>

        /* 全体 */
        body{
          font-family:sans-serif;
          background:#f5f5f5;
          margin:0;
          text-align:center;
          font-size:26px;
        }

        /* カード */
        .card{
          background:white;
          margin:15px;
          padding:30px;
          border-radius:20px;
        }

        /* 問題 */
        #q{
          font-size:34px;
          margin-bottom:25px;
        }

        /* 選択肢 */
        #choices{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:20px;
        }

        .choice{
          padding:35px;
          font-size:28px;
          border-radius:20px;
          color:white;
        }

        .c0{background:#e74c3c;}
        .c1{background:#3498db;}
        .c2{background:#f1c40f;color:black;}
        .c3{background:#2ecc71;}

        .dim{opacity:0.3;}
        .selected{outline:8px solid black;}

        /* ✅ 無効 */
        .choice.disabled{
          opacity:0.35;
          pointer-events:none;
        }

        /* ✅ 正解だけ強制復活 */
        .choice.answer-correct{
          opacity:1 !important;
        }

        /* 結果 */
        #result{
          font-size:32px;
          margin-top:20px;
        }

        #answerText{
          font-size:28px;
        }

        #scoreText{
          font-size:30px;
          font-weight:bold;
        }

        /* ランキング */
        .rank{
          padding:20px;
          margin:10px;
          border-radius:12px;
          font-size:26px;
        }

        .top1{background:#ffe066;}
        .top2{background:#e0e0e0;}
        .top3{background:#f5c993;}
        .normal{background:white;border:2px solid #ccc;}

    </style>
</head>

<body>

<h1>クイズ</h1>

<!-- 参加 -->
<div id="join" class="card">
    <input id="name" placeholder="名前" style="font-size:24px; padding:10px;">
    <br><br>
    <button style="font-size:26px; padding:15px;" onclick="join()">参加</button>
</div>

<!-- 待機 -->
<div id="wait" class="card" style="display:none;">
    <h2>待機中</h2>
</div>

<!-- ブロック -->
<div id="blocked" class="card" style="display:none;">
    <h2>現在参加できません</h2>
</div>

<!-- 問題 -->
<div id="quiz" class="card" style="display:none;">
    <h2 id="q"></h2>
    <div id="choices"></div>

    <p id="result"></p>
    <p id="answerText"></p>
    <p id="scoreText"></p>
</div>

<!-- ランキング -->
<div id="ranking" class="card" style="display:none;">
    <h2>ランキング</h2>
    <div id="rankList"></div>
</div>

<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, addDoc, collection, doc,
      getDoc, setDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
      apiKey:"AIzaSy...",
      authDomain:"quiz-app-97d7c.firebaseapp.com",
      projectId:"quiz-app-97d7c"
    }));

    let userId = localStorage.getItem("userId");
    let myChoice=null;
    let lastQ=null;

    /* 画面切替 */
    function show(id){
      ["join","wait","quiz","blocked","ranking"].forEach(x=>{
        document.getElementById(x).style.display="none";
      });
      document.getElementById(id).style.display="block";
    }

    /* ユーザー確認 */
    async function validateUser(){
      if(!userId) return false;

      const snap = await getDoc(doc(db,"players",userId));

      if(!snap.exists()){
        localStorage.removeItem("userId");
        userId=null;
        return false;
      }

      return true;
    }

    /* 参加 */
    window.join = async ()=>{
      const s = (await getDoc(doc(db,"game","state"))).data();
      if(s.mode !== "join") return;

      const name=document.getElementById("name").value;
      if(!name)return;

      const ref = await addDoc(collection(db,"players"),{
        name,
        score:0
      });

      userId = ref.id;
      localStorage.setItem("userId",userId);

      show("wait");
    };

    /* スコア */
    async function addScore(q){

      const ref = doc(db,"answers","q"+lastQ,"users",userId);
      const snap = await getDoc(ref);

      if(!snap.exists()) return;

      const data = snap.data();
      if(data.scored) return;
      if(data.choice !== q.answer) return;

      const pRef = doc(db,"players",userId);
      const p = await getDoc(pRef);

      const score = p.data().score||0;

      await setDoc(pRef,{score:score+1},{merge:true});
      await setDoc(ref,{scored:true},{merge:true});
    }

    /* ✅ 選択肢（完全版） */
    function buildChoices(q,s,showAnswer){

      let html="";
      const label=["①","②","③","④"];

      q.choices.forEach((c,i)=>{

        let cls="choice c"+i;

        if(showAnswer){
          if(i === q.answer){
            cls += " answer-correct";
          }else{
            cls += " dim";
          }
        }

        if(!showAnswer && myChoice !== null && i !== myChoice){
          cls += " dim";
        }

        if(i === myChoice){
          cls += " selected";
        }

        const clickable =
          (s.acceptingAnswers && !showAnswer)
          ? `onclick="answer(${i})"`
          : "";

        if(!s.acceptingAnswers && !showAnswer){
          cls += " disabled";
        }

        html+=`
          <div class="${cls}" ${clickable}>
            ${label[i]} ${c}
          </div>`;
      });

      return html;
    }

    /* =====================
       state監視
    ===================== */
    onSnapshot(doc(db,"game","state"), async snap=>{

      const s = snap.data();
      if(!s) return;

      const valid = await validateUser();

      // ✅ ✅ ✅ 問題変更時リセット（今回の核心）
      if(s.questionId !== lastQ){
        lastQ = s.questionId;
        myChoice = null;

        document.getElementById("result").innerText = "";
        document.getElementById("answerText").innerText = "";
        document.getElementById("scoreText").innerText = "";

        // UIも消す
        document.getElementById("choices").innerHTML = "";
      }

      if(!valid){
        if(s.mode==="join") show("join");
        else show("blocked");
        return;
      }

      if(s.mode==="waiting"){
        show("wait");
        return;
      }

      // 問題
      if(s.mode==="question"){

        show("quiz");

        const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

        document.getElementById("q").innerText = q.text;

        document.getElementById("choices").innerHTML =
          buildChoices(q,s,false);

        return;
      }

      // 解答
      if(s.mode==="answer"){

        show("quiz");

        const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

        document.getElementById("q").innerText = q.text;

        document.getElementById("choices").innerHTML =
          buildChoices(q,s,true);

        document.getElementById("result").innerText =
          (myChoice===q.answer) ? "正解" : "不正解";

        document.getElementById("answerText").innerText =
          "正解は "+(q.answer+1)+" 番";

        await addScore(q);

        const player=(await getDoc(doc(db,"players",userId))).data();

        document.getElementById("scoreText").innerText =
          "スコア: "+player.score;

        return;
      }

      // ランキング
      if(s.mode==="ranking"){

        show("ranking");

        const snapRank = await getDoc(doc(db,"ranking","current"));
        if(!snapRank.exists()) return;

        let html="";

        snapRank.data().top10.forEach((p,i)=>{

          let cls="rank normal";
          if(i===0) cls="rank top1";
          else if(i===1) cls="rank top2";
          else if(i===2) cls="rank top3";

          html+=`
            <div class="${cls}">
              ${i+1}位　${p.name}　${p.score}点
            </div>`;
        });

        document.getElementById("rankList").innerHTML=html;
      }

    });

    /* 回答 */
    window.answer = async (i)=>{

      const s=(await getDoc(doc(db,"game","state"))).data();

      if(!s.acceptingAnswers || s.mode==="answer") return;

      myChoice=i;

      const q=(await getDoc(doc(db,"questions","q"+s.questionId))).data();

      document.getElementById("choices").innerHTML =
        buildChoices(q,s,false);

      await setDoc(
        doc(db,"answers","q"+s.questionId,"users",userId),
        {choice:i, scored:false}
      );
    };

</script>
</body>
</html>
